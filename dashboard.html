<!DOCTYPE html>
<html>

<head>
<title>InnovateX Dashboard</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
margin:0;
color:white;
}

.header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 15px #00ffc3;
}

.header h2{
color:#00ffc3;
margin:0;
}

.logout{
background:red;
border:none;
padding:8px 15px;
color:white;
cursor:pointer;
border-radius:6px;
}

.chat-container{
height:80vh;
overflow-y:auto;
padding:20px;
}

.bot{
background:#222;
padding:10px;
margin:10px 0;
border-radius:8px;
max-width:60%;
}

.user{
background:#00ffc3;
color:black;
padding:10px;
margin:10px 0;
border-radius:8px;
max-width:60%;
margin-left:auto;
}

.input-area{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
}

.input-area input{
flex:1;
padding:15px;
border:none;
background:#1a1a1a;
color:white;
}

.input-area button{
padding:15px;
border:none;
background:#00ffc3;
cursor:pointer;
}

.buttons{
padding:10px;
}

.buttons button{
background:#00ffc3;
border:none;
padding:8px 15px;
margin-right:10px;
cursor:pointer;
border-radius:6px;
}

.upload{
background:#2196f3;
color:white;
padding:10px;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<script>

if(!localStorage.getItem("loggedUser")){
window.location="login.html"
}

</script>

<div class="header">
<h2>InnovateX AI Assistant</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="chat-container" id="chat"></div>

<div class="buttons">

<button onclick="sayHi()">Hi</button>

<button onclick="internship()">I want internship</button>

<button onclick="findInternships()">Find Internships</button>

<button onclick="startInterview()">Start Interview</button>

</div>

<div class="input-area">

<input id="msg" placeholder="Type message">

<button onclick="send()">Send</button>

</div>

<script>

/* AUTO GREETING */

setTimeout(()=>{
bot("Hi 👋 I am InnovateX AI Assistant. Upload your resume and I will analyze your skills and recommend internships.")
},800)



function bot(text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="bot"

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}



function user(text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="user"

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}



/* SEND MESSAGE */

async function send(){

let msg=document.getElementById("msg").value.trim()

if(msg==="") return

user(msg)

document.getElementById("msg").value=""

bot("AI is typing...")

try{

let response=await fetch(
"https://innovatex-backend-production.up.railway.app/ai-chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
question:msg
})
}
)

let data=await response.json()

let chat=document.getElementById("chat")
chat.lastChild.remove()

bot(data.reply || data.answer)

}catch(error){

bot("⚠️ AI server error")

}

}



/* ENTER KEY */

document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key==="Enter"){
send()
}

})



function sayHi(){

user("Hi")

sendAI("Hi")

}



function internship(){

user("I want internship")

setTimeout(()=>{

bot("Please upload your resume so I can analyze your skills.")

let btn=document.createElement("button")

btn.innerText="Upload Resume"

btn.className="upload"

btn.onclick=uploadResume

document.getElementById("chat").appendChild(btn)

},600)

}



/* UPLOAD RESUME */

async function uploadResume(){

let input=document.createElement("input")
input.type="file"
input.accept=".pdf"

input.onchange=async function(){

let file=input.files[0]

let formData=new FormData()

formData.append("resume",file)

bot("Uploading resume...")

try{

let response=await fetch(
"https://innovatex-backend-production.up.railway.app/upload-resume",
{
method:"POST",
body:formData
})

let data=await response.json()

bot("Resume uploaded successfully ✅")

detectSkills(data.resume_text)

}catch(e){

bot("⚠️ Resume upload failed")

}

}

input.click()

}



/* SKILL DETECTION */

function detectSkills(text){

let skills=[]

let t=text.toLowerCase()

if(t.includes("python")) skills.push("Python")
if(t.includes("java")) skills.push("Java")
if(t.includes("machine learning")) skills.push("Machine Learning")
if(t.includes("sql")) skills.push("SQL")
if(t.includes("html")) skills.push("HTML")
if(t.includes("css")) skills.push("CSS")

if(skills.length===0){

bot("No major skills detected")

}else{

bot("Detected Skills: "+skills.join(", "))

}

}



/* INTERNSHIP FINDER */

async function findInternships(){

bot("Searching internships...")

try{

let response=await fetch(
"https://innovatex-backend-production.up.railway.app/live-internships"
)

let data=await response.json()

if(data.length===0){

bot("No internships found")

return

}

bot("Top internships for you:")

data.slice(0,5).forEach(job=>{

bot(
"Company: "+job.company+
"\nRole: "+job.role+
"\nLocation: "+job.location
)

})

}catch(e){

bot("⚠️ Internship API error")

}

}



/* INTERVIEW */

async function startInterview(){

bot("Starting interview practice...")

try{

let response=await fetch(
"https://innovatex-backend-production.up.railway.app/mcq"
)

let data=await response.json()

let q=data.question

bot("Question: "+q.question)

q.options.forEach(opt=>{

let btn=document.createElement("button")

btn.className="upload"

btn.innerText=opt

btn.onclick=function(){

if(opt===q.answer){

bot("✅ Correct!")

}else{

bot("❌ Wrong. Correct answer: "+q.answer)

}

}

document.getElementById("chat").appendChild(btn)

})

}catch(e){

bot("⚠️ Interview API error")

}

}



/* QUICK AI */

async function sendAI(message){

bot("AI is typing...")

let response=await fetch(
"https://innovatex-backend-production.up.railway.app/ai-chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
question:message
})
}
)

let data=await response.json()

let chat=document.getElementById("chat")
chat.lastChild.remove()

bot(data.reply || data.answer)

}



/* LOGOUT */

function logout(){

localStorage.removeItem("loggedUser")

window.location="login.html"

}

</script>

</body>
</html>
